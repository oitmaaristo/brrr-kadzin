services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoradar
      POSTGRES_USER: autoradar
      POSTGRES_PASSWORD: autoradar
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoradar"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://autoradar:autoradar@db:5432/autoradar
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - POLL_INTERVAL_MIN=${POLL_INTERVAL_MIN:-15}
      - POLL_INTERVAL_MAX=${POLL_INTERVAL_MAX:-45}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    restart: unless-stopped

volumes:
  pgdata:
