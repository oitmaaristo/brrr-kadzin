services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoradar
      POSTGRES_USER: autoradar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autoradar_secret_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoradar"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://autoradar:${DB_PASSWORD:-autoradar_secret_2026}@db:5432/autoradar
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - POLL_INTERVAL_MIN=${POLL_INTERVAL_MIN:-20}
      - POLL_INTERVAL_MAX=${POLL_INTERVAL_MAX:-45}
    ports:
      - "127.0.0.1:8001:8000"
    shm_size: 2gb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "0.0.0.0:3010:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    restart: unless-stopped

volumes:
  pgdata:
